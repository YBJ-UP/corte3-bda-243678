services:
  postgres:
    image: postgres:16-alpine
    container_name: vetDB
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER_ADMIN}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_ADMIN}
      POSTGRES_DB: ${POSTGRES_DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - redis-net

  redis:
    image: redis:7-alpine
    container_name: vet-redis
    # Configuración de Redis como cache:
    # --appendonly yes        → persistencia AOF (para inspeccionar datos en clase)
    # --maxmemory 256mb       → límite de memoria
    # --maxmemory-policy allkeys-lru → evicción LRU cuando se llena
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - redis-net

  backend:
    build: ./api
    container_name: vet-api
    environment:
      DATABASE_URL: postgresql://postgres:postgres123@postgres:5432/postgres
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - redis-net

  nextjs:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: nextjs_container
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:

networks:
  redis-net:
    driver: bridge